<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motor 3D · Despiece Interactivo — Peru Tractor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#0b1020; --bg2:#131d36; --card:#141d33; --ink:#EDF1FB; --ink2:#8ea3cf; --ink3:#6b76a0;
 --line:rgba(140,120,255,.18); --morado:#6d4eff; --teal:#00FFD1; --amber:#f5a623; --rojo:#e5484d;
 --cat:#FFB300;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:radial-gradient(1200px 700px at 60% 0%,#1a2745,#0b1020 70%);
 color:var(--ink);font-family:'Exo 2',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
h1,h2,h3,.mono{font-family:'Orbitron',sans-serif}
#scene{position:fixed;inset:0;z-index:1;cursor:grab}
#scene:active{cursor:grabbing}
/* ---- Top bar ---- */
.top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:14px;
 padding:14px 20px;background:linear-gradient(180deg,rgba(11,16,32,.9),transparent)}
.brand{display:flex;align-items:center;gap:10px;font-family:'Orbitron';font-weight:700;font-size:14px;letter-spacing:.4px}
.brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--cat),var(--teal))}
.back{font-size:12.5px;color:var(--ink2);text-decoration:none;background:rgba(255,255,255,.05);
 border:1px solid var(--line);padding:8px 13px;border-radius:20px;transition:.15s}
.back:hover{background:rgba(255,255,255,.1);color:#fff}
.spacer{flex:1}
select#engSel{font-family:'Orbitron';font-weight:700;font-size:13px;color:#fff;background:#1b2643;
 border:1px solid var(--line);border-radius:12px;padding:9px 14px;cursor:pointer;outline:none}
.engmeta{font-size:11.5px;color:var(--ink2)}
.engmeta b{color:var(--cat)}
/* ---- Panel derecho ---- */
#panel{position:fixed;top:64px;right:16px;z-index:15;width:min(340px,90vw);max-height:calc(100vh - 190px);
 background:linear-gradient(162deg,rgba(19,29,54,.92),rgba(11,16,32,.92));backdrop-filter:blur(10px);
 border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;
 box-shadow:0 40px 90px -34px rgba(0,0,0,.8)}
.p-head{padding:15px 17px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px}
.p-head .sw{width:34px;height:34px;border-radius:10px;flex:0 0 auto;box-shadow:0 4px 12px -4px rgba(0,0,0,.6)}
.p-head .tt{font-family:'Orbitron';font-weight:700;font-size:14px;line-height:1.15}
.p-head .st{font-size:10.5px;color:var(--teal);letter-spacing:.3px;margin-top:2px}
.p-body{overflow-y:auto;padding:6px 6px 10px}
.pc{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:11px;transition:background .15s}
.pc:hover{background:rgba(109,78,255,.1)}
.pc .q{flex:0 0 auto;min-width:34px;height:34px;padding:0 6px;border-radius:9px;
 background:linear-gradient(135deg,var(--cat),#f59e0b);color:#161d33;font-family:'Orbitron';
 font-weight:800;font-size:14px;display:grid;place-items:center}
.pc .i{flex:1;min-width:0}
.pc .i b{display:block;font-size:12px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc .i span{font-size:10px;color:var(--ink3)}
.pc .buy{font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:6px;background:rgba(229,72,77,.18);color:#ff8f92}
.p-empty{padding:26px 18px;text-align:center;color:var(--ink2);font-size:12.5px;line-height:1.6}
.p-empty .big{font-size:30px;display:block;margin-bottom:8px}
/* ---- Chips de secciones ---- */
#legend{position:fixed;left:16px;top:64px;z-index:15;width:min(220px,42vw);max-height:calc(100vh - 200px);
 overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding-right:4px}
.legchip{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:11px;cursor:pointer;
 background:rgba(19,29,54,.7);border:1px solid var(--line);transition:.15s;font-size:12px}
.legchip:hover{background:rgba(109,78,255,.18);transform:translateX(2px)}
.legchip.active{border-color:var(--cat);background:rgba(255,179,0,.14)}
.legchip .d{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
.legchip .nm{flex:1;color:#e7ecfb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legchip .ct{font-size:10px;color:var(--ink2)}
/* ---- Controles inferiores ---- */
.controls{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:20;
 display:flex;align-items:center;gap:16px;padding:13px 20px;background:linear-gradient(162deg,rgba(19,29,54,.95),rgba(11,16,32,.95));
 border:1px solid var(--line);border-radius:18px;box-shadow:0 30px 70px -30px rgba(0,0,0,.8);max-width:94vw;flex-wrap:wrap;justify-content:center}
.ctl{display:flex;align-items:center;gap:9px}
.ctl label{font-size:11px;color:var(--ink2);font-weight:600;white-space:nowrap}
input[type=range]{-webkit-appearance:none;appearance:none;width:180px;height:6px;border-radius:6px;
 background:linear-gradient(90deg,var(--morado),var(--cat));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;
 background:#fff;cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.5),0 0 0 3px rgba(255,179,0,.4)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:none;cursor:pointer}
.btn{font-size:12px;font-weight:600;color:#e7ecfb;background:rgba(255,255,255,.06);border:1px solid var(--line);
 padding:9px 14px;border-radius:12px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
.btn:hover{background:rgba(109,78,255,.25);color:#fff}
.btn.on{background:rgba(255,179,0,.2);border-color:var(--cat);color:#fff}
.badge-exp{font-family:'Orbitron';font-size:11px;font-weight:700;color:var(--cat);min-width:74px;text-align:left}
/* ---- Tooltip hover ---- */
#tip{position:fixed;z-index:30;pointer-events:none;background:rgba(11,16,32,.95);border:1px solid var(--cat);
 color:#fff;font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;display:none;white-space:nowrap;
 box-shadow:0 10px 30px -10px rgba(0,0,0,.7)}
#tip span{color:var(--cat);font-size:10.5px;display:block;font-weight:500}
/* ---- Hint inicial ---- */
#hint{position:fixed;left:50%;top:90px;transform:translateX(-50%);z-index:14;text-align:center;
 font-size:12.5px;color:var(--ink2);background:rgba(11,16,32,.7);padding:9px 16px;border-radius:20px;
 border:1px solid var(--line);transition:opacity .5s}
#load{position:fixed;inset:0;z-index:40;display:grid;place-items:center;background:var(--bg);color:var(--ink2);font-size:14px}
.spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--cat);border-radius:50%;
 animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:760px){
 #legend{display:none}
 #panel{top:auto;bottom:120px;right:8px;left:8px;width:auto;max-height:38vh}
 input[type=range]{width:130px}
}
</style>
</head>
<body>
<div id="load"><div><div class="spin"></div>Cargando motor 3D…</div></div>
<canvas id="scene"></canvas>

<div class="top">
  <span class="brand"><span class="dot"></span>MOTOR 3D · PERU TRACTOR</span>
  <a class="back" href="index.html">← Tablero</a>
  <div class="spacer"></div>
  <div style="text-align:right">
    <select id="engSel"></select>
    <div class="engmeta" id="engMeta"></div>
  </div>
</div>

<div id="hint">🖱️ Arrastra para girar · rueda para zoom · usa el slider para <b>desarmar</b> · toca una pieza</div>

<div id="legend"></div>

<div id="panel">
  <div class="p-head">
    <div class="sw" id="pSw" style="background:linear-gradient(135deg,var(--cat),#f59e0b)"></div>
    <div><div class="tt" id="pTitle">Selecciona una pieza</div><div class="st" id="pSub">toca el motor o la lista</div></div>
  </div>
  <div class="p-body" id="pBody">
    <div class="p-empty"><span class="big">🧩</span>Toca una sección del motor (o de la lista de la izquierda) para ver <b>qué piezas lleva y cuántas</b>.</div>
  </div>
</div>

<div id="tip"></div>

<div class="controls">
  <div class="ctl">
    <label>Armado</label>
    <input type="range" id="expSlider" min="0" max="100" value="0">
    <label>Despiece</label>
    <span class="badge-exp" id="expBadge">0%</span>
  </div>
  <button class="btn" id="btnRot">🔄 Girar</button>
  <button class="btn" id="btnExplode">💥 Despiezar</button>
  <button class="btn" id="btnReset">⟲ Reiniciar vista</button>
</div>

<script>

   'Turbo':{ ex:[2.2,2.4,2.2], build(){ const chra=cyl(0.35,0.35,0.5,STEELD(),22); chra.rotation.z=Math.PI/2;
      const comp=cyl(0.5,0.32,0.45,CHROME(),26); comp.rotation.z=Math.PI/2; comp.position.x=-0.45;
      const turb=cyl(0.5,0.32,0.45,STEEL(),26); turb.rotation.z=Math.PI/2; turb.position.x=0.45;
      const inlet=cyl(0.22,0.22,0.5,DARK(),18); inlet.position.set(-0.45,0.5,0);
      return g([chra,comp,turb,inlet],[1.3,1.85,1.15]); } },
   'Manifold/Escape':{ ex:[0,0.8,3.5], build(){ const rail=cyl(0.16,0.16,3.4,STEELD(),18); rail.rotation.z=Math.PI/2;
      const runs=[]; for(let i=0;i<4;i++){ const r=cyl(0.15,0.15,0.6,STEELD(),14); r.position.set(-1.4+i*0.95,-0.35,0); runs.push(r);} const out=cyl(0.24,0.24,0.6,DARK(),18); out.rotation.z=Math.PI/2; out.position.set(1.6,0,0); return g([rail,...runs,out],[0.2,0.95,1.2]); } },
   'Bombas':{ ex:[-2.2,0,3.0], build(){ const body=cyl(0.42,0.42,0.5,STEELD(),24); body.rotation.x=Math.PI/2;

  // fallback genérico para familias sin shape definido
  function genericBuild(idx){ const b=box(0.6,0.6,0.6,STEELD()); const ang=idx*1.3; return g([b],[Math.cos(ang)*3.2,0.4+ (idx%3)*0.5,Math.sin(ang)*2.4]); }
  function genericEx(idx){ const ang=idx*1.3; return [Math.cos(ang)*2.2,0.6,Math.sin(ang)*2.2]; }

  // ═══ escena ═══
  const canvas=document.getElementById('scene');

  const scene=new THREE.Scene();

  // luces

  key.shadow.mapSize.set(1024,1024); key.shadow.camera.near=1; key.shadow.camera.far=40;

  const engineGroup=new THREE.Group(); scene.add(engineGroup);

  let sections=[];      // {name, group, ex:[x,y,z], base:{x,y,z}, meshes:[], color, pieces:[]}
  let curEngine=null, explodeAmt=0, autoRot=false, selected=null;

  function buildEngine(eng){

    const order=Object.keys(DEF); // orden preferido

    fams.forEach((fam,idx)=>{
      const def=DEF[fam];
      const grp = def? def.build() : genericBuild(idx);
      const ex  = def? def.ex : genericEx(idx);
      const base={x:grp.position.x,y:grp.position.y,z:grp.position.z};
      const meshes=[]; grp.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; meshes.push(o);
        o.userData._c=o.material.color.getHex(); o.userData._e=o.material.emissive?o.material.emissive.getHex():0; } });
      const sec={name:fam, group:grp, ex, base, meshes, pieces:eng.sec[fam]};
      meshes.forEach(mesh=>{ mesh.userData.sec=sec; clickable.push(mesh); });
      engineGroup.add(grp);
      sections.push(sec);
    });
    applyExplode();
    buildLegend();
    // panel reset
    selectSection(null);
    document.getElementById('engMeta').innerHTML=`${eng.grupo} · <b>${fams.length}</b> secciones · ${countPieces(eng)} piezas`;
  }
  function countPieces(eng){ let n=0; Object.values(eng.sec).forEach(a=>n+=a.length); return n; }

  function applyExplode(){
    sections.forEach(s=>{ s.group.position.set(
      s.base.x + s.ex[0]*explodeAmt,
      s.base.y + s.ex[1]*explodeAmt,
      s.base.z + s.ex[2]*explodeAmt ); });
  }

  // ═══ selección / resaltado ═══
  function setEmissive(sec,on){ sec.meshes.forEach(m=>{ if(m.material.emissive){ m.material.emissive.setHex(on?0xffb300:(m.userData._e||0)); m.material.emissiveIntensity=on?0.5:1; } }); }
  function setDim(sec,dim){ sec.meshes.forEach(m=>{ m.material.opacity=dim?0.22:1; m.material.transparent=dim; }); }
  function selectSection(sec){
    selected=sec;
    sections.forEach(s=>{ setEmissive(s,false); setDim(s, sec? (s!==sec):false); });
    if(sec){ setEmissive(sec,true); }
    renderPanel(sec);
    [...document.querySelectorAll('.legchip')].forEach(c=>c.classList.toggle('active', sec && c.dataset.name===sec.name));
  }

  function renderPanel(sec){
    const body=document.getElementById('pBody'), title=document.getElementById('pTitle'), sub=document.getElementById('pSub'), sw=document.getElementById('pSw');
    if(!sec){ title.textContent='Selecciona una pieza'; sub.textContent='toca el motor o la lista'; sw.style.background='linear-gradient(135deg,var(--cat),#f59e0b)';
      body.innerHTML='<div class="p-empty"><span class="big">🧩</span>Toca una sección del motor (o de la lista) para ver <b>qué piezas lleva y cuántas</b>.</div>'; return; }
    sw.style.background=colHex(sec.name);
    title.textContent=sec.name;
    const tot=sec.pieces.reduce((a,p)=>a+p[2],0);
    sub.textContent=`${sec.pieces.length} piezas · ${tot} unidades`;
    body.innerHTML=sec.pieces.slice().sort((a,b)=>b[2]-a[2]).map(p=>`
      <div class="pc">
        <div class="q">${p[2]}</div>
        <div class="i"><b>${esc(p[1])}</b><span>${esc(p[0])}</span></div>
        ${p[3]>0?`<div class="buy">comprar ${p[3]}</div>`:''}
      </div>`).join('');
  }
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function buildLegend(){
    const leg=document.getElementById('legend');
    leg.innerHTML=sections.map(s=>`
      <div class="legchip" data-name="${esc(s.name)}">
        <span class="d" style="background:${colHex(s.name)}"></span>
        <span class="nm">${esc(s.name)}</span>
        <span class="ct">${s.pieces.length}</span>
      </div>`).join('');
    [...leg.querySelectorAll('.legchip')].forEach(c=>{
      c.addEventListener('click',()=>{ const s=sections.find(x=>x.name===c.dataset.name); selectSection(selected===s?null:s); focusSection(selected); });
    });
  }

  // ═══ cámara orbital (custom) ═══
  let theta=0.7, phi=1.15, radius=13, target=new THREE.Vector3(0,0,0);
  function updateCam(){ const r=radius; camera.position.set(
      target.x + r*Math.sin(phi)*Math.cos(theta),
      target.y + r*Math.cos(phi),
      target.z + r*Math.sin(phi)*Math.sin(theta) );
    camera.lookAt(target); }
  function focusSection(sec){ /* suaviza target hacia la sección seleccionada */ if(sec){ const p=sec.group.position; target._to={x:p.x*0.5,y:p.y*0.4,z:p.z*0.5}; } else target._to={x:0,y:0,z:0}; }

  let dragging=false, lastX=0, lastY=0, moved=0;
  canvas.addEventListener('pointerdown',e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; moved=0; canvas.setPointerCapture(e.pointerId); });
  canvas.addEventListener('pointermove',e=>{
    if(dragging){ const dx=e.clientX-lastX, dy=e.clientY-lastY; lastX=e.clientX; lastY=e.clientY; moved+=Math.abs(dx)+Math.abs(dy);
      theta-=dx*0.008; phi=Math.max(0.25,Math.min(2.6,phi - dy*0.008)); }
    else hoverTest(e);
  });
  window.addEventListener('pointerup',e=>{ if(dragging){ dragging=false; if(moved<6) clickTest(e); } });
  canvas.addEventListener('wheel',e=>{ e.preventDefault(); radius=Math.max(6,Math.min(26,radius+ (e.deltaY>0?1:-1)*0.9)); },{passive:false});

  const ray=new THREE.Raycaster(), mouse=new THREE.Vector2(), tip=document.getElementById('tip');
  function pick(e){ const r=canvas.getBoundingClientRect(); mouse.x=((e.clientX-r.left)/r.width)*2-1; mouse.y=-((e.clientY-r.top)/r.height)*2+1;
    ray.setFromCamera(mouse,camera); return ray.intersectObjects(clickable,false); }
  function clickTest(e){ const hit=pick(e); if(hit.length){ const s=hit[0].object.userData.sec; selectSection(selected===s?null:s); focusSection(selected); hideHint(); } else { selectSection(null); focusSection(null); } }
  function hoverTest(e){ const hit=pick(e); if(hit.length){ const s=hit[0].object.userData.sec; canvas.style.cursor='pointer';
      const tot=s.pieces.reduce((a,p)=>a+p[2],0); tip.style.display='block'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+14)+'px';
      tip.innerHTML=`${esc(s.name)}<span>${s.pieces.length} piezas · ${tot} uds</span>`; }
    else { canvas.style.cursor='grab'; tip.style.display='none'; } }
  canvas.addEventListener('pointerleave',()=>tip.style.display='none');

  // ═══ controles UI ═══
  const expSlider=document.getElementById('expSlider'), expBadge=document.getElementById('expBadge');
  expSlider.addEventListener('input',()=>{ explodeAmt=expSlider.value/100; expBadge.textContent=expSlider.value+'%'; applyExplode(); hideHint(); });
  document.getElementById('btnRot').addEventListener('click',function(){ autoRot=!autoRot; this.classList.toggle('on',autoRot); });
  document.getElementById('btnExplode').addEventListener('click',function(){ const target=explodeAmt>0.5?0:1; animateExplode(target); this.classList.toggle('on',target>0.5); hideHint(); });
  document.getElementById('btnReset').addEventListener('click',()=>{ theta=0.7;phi=1.15;radius=13; target.set(0,0,0); target._to={x:0,y:0,z:0}; selectSection(null); focusSection(null); });
  function animateExplode(to){ const from=explodeAmt, t0=performance.now(), dur=900;
    (function step(now){ const k=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-k,3); explodeAmt=from+(to-from)*e;
      expSlider.value=Math.round(explodeAmt*100); expBadge.textContent=expSlider.value+'%'; applyExplode();
      if(k<1) requestAnimationFrame(step); })(t0);
  }
  let hintTimer=setTimeout(hideHint,7000);
  function hideHint(){ const h=document.getElementById('hint'); if(h){h.style.opacity='0'; setTimeout(()=>h.remove(),600);} clearTimeout(hintTimer); }

  // selector de motores
  const sel=document.getElementById('engSel');
  sel.innerHTML=DATA.map((e,i)=>`<option value="${i}">${esc(e.label)}</option>`).join('');
  sel.addEventListener('change',()=>{ buildEngine(DATA[+sel.value]); });

  // preselección por ?engine=
  const q=new URLSearchParams(location.search).get('engine');
  let startIdx=0; if(q){ const j=DATA.findIndex(e=>e.id.toLowerCase()===q.toLowerCase()); if(j>=0) startIdx=j; }
  sel.value=startIdx; buildEngine(DATA[startIdx]);

  // ═══ loop ═══
  function tick(){
    if(autoRot) theta+=0.0035;
    if(target._to){ target.x+=(target._to.x-target.x)*0.08; target.y+=(target._to.y-target.y)*0.08; target.z+=(target._to.z-target.z)*0.08; }
    updateCam();
    renderer.render(scene,camera);
    requestAnimationFrame(tick);
  }
  updateCam(); tick();
  document.getElementById('load').style.display='none';

  window.addEventListener('resize',()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });
})();
</script>
</body>
</html>
